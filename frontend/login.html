<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CineMatch AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">🎬 CineMatch AI</div>
    </nav>

    <div class="login-container" style="max-width: 400px; margin: 80px auto; padding: 30px; background: var(--card-bg); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
        <h2 style="text-align: center; margin-bottom: 20px;">Welcome Back</h2>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Email Address</label>
            <input type="email" id="email" placeholder="enter your email" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: transparent; color: var(--text-color);">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Password</label>
            <input type="password" id="password" placeholder="••••••••" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: transparent; color: var(--text-color);">
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogin()" style="flex: 1; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Log In</button>
            <button onclick="handleSignUp()" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; font-weight: 600;">Sign Up</button>
        </div>
    </div>

    <div id="notification-container"></div>
    
    <script src="script.js"></script>
</body>
</html>
