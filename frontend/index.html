<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">🎬 CINEMATCH AI</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="favorites.html">Favorites</a>
            <button id="theme-toggle">🌙 Theme</button>
            <button onclick="handleLogout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <header>
        <h1>Your Next Favorite Movie,<br><span style="color:var(--accent)">Found by AI.</span></h1>
        <div class="search-box">
            <input type="text" id="vibe-query" placeholder="Tell me your vibe...">
            <button onclick="fetchMovies()">Find Movie</button>
        </div>
    </header>

    <main>
        <div id="movie-grid" class="grid"></div>
    </main>

    <div id="notification-container"></div>
    
    <script src="script.js"></script>
</body>
</html>
